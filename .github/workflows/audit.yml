# Supply-chain security audit. Runs three independent dependency scanners
# against the locked manifests:
#
#   pip-audit    Python wheels listed in requirements.lock.
#   npm-audit    Production npm dependencies under ui/.
#   cargo-audit  Rust crates pinned in ui/src-tauri/Cargo.lock.
#
# Triggered on every pull request that touches a manifest plus a weekly
# cron so newly-disclosed CVEs surface even when the lockfiles are quiet.
# Also exposes workflow_dispatch for ad-hoc runs.

name: Audit

on:
  pull_request:
    branches: [main]
  schedule:
    # 06:17 UTC every Monday — off-peak, avoids the top-of-hour stampede.
    - cron: '17 6 * * 1'
  workflow_dispatch:

# Audit jobs only need to read the repo. No write scopes anywhere.
permissions:
  contents: read

jobs:
  pip-audit:
    name: Audit Python dependencies (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements.lock
        run: pip-audit -r requirements.lock --strict

  npm-audit:
    name: Audit npm dependencies (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Audit production dependencies
        run: cd ui && npm audit --omit=dev --audit-level=high

  cargo-audit:
    name: Audit Rust dependencies (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Audit Cargo.lock
        run: cd ui/src-tauri && cargo audit
