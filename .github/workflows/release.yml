name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default for GITHUB_TOKEN. Build jobs only need to read
# the repository; the `release` job below overrides this to `contents: write`
# so it can publish a GitHub Release.
permissions:
  contents: read

jobs:
  build-daemon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build daemon binary
        run: pyinstaller context-recall.spec --noconfirm

      - name: Upload daemon artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: context-recall-daemon
          path: dist/context-recall-daemon/

  build-app:
    runs-on: macos-14
    needs: build-daemon
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download daemon artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: context-recall-daemon
          path: ui/src-tauri/resources/context-recall-daemon

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build Tauri app
        run: cd ui && npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

      - name: Build Tauri app (unsigned)
        run: cd ui && npm run tauri build
        if: ${{ !env.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-dmg
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload updater artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: updater-files
          path: |
            ui/src-tauri/target/release/bundle/macos/*.tar.gz
            ui/src-tauri/target/release/bundle/macos/*.tar.gz.sig
            ui/src-tauri/target/release/bundle/macos/latest.json
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

  release:
    runs-on: ubuntu-latest
    needs: build-app
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download updater files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: updater-files
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
