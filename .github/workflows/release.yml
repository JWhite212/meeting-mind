name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default for GITHUB_TOKEN. Build jobs only need to read
# the repository; the `release` job below overrides this to `contents: write`
# so it can publish a GitHub Release.
permissions:
  contents: read

jobs:
  build-daemon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build daemon binary
        run: pyinstaller context-recall.spec --noconfirm

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-recall-daemon
          path: dist/context-recall-daemon/

  build-app:
    runs-on: macos-14
    needs: build-daemon
    steps:
      - uses: actions/checkout@v4

      - name: Download daemon artifact
        uses: actions/download-artifact@v4
        with:
          name: context-recall-daemon
          path: ui/src-tauri/resources/context-recall-daemon

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build Tauri app
        run: cd ui && npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

      - name: Build Tauri app (unsigned)
        run: cd ui && npm run tauri build
        if: ${{ !env.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-files
          path: |
            ui/src-tauri/target/release/bundle/macos/*.tar.gz
            ui/src-tauri/target/release/bundle/macos/*.tar.gz.sig
            ui/src-tauri/target/release/bundle/macos/latest.json
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}

  release:
    runs-on: ubuntu-latest
    needs: build-app
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download updater files
        uses: actions/download-artifact@v4
        with:
          name: updater-files
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
