name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN. Both jobs only need to read
# the repository contents; no job in this workflow writes back to GitHub.
permissions:
  contents: read

jobs:
  python-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v

  typescript-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Type check
        run: cd ui && npx tsc --noEmit

      - name: Run UI tests
        working-directory: ui
        run: npm test
