# MeetingMind Configuration
# Copy to config.yaml and fill in your values.

# --- Meeting Detection ---
detection:
  # How often to poll for an active Teams meeting (seconds).
  poll_interval_seconds: 3

  # Minimum meeting duration (seconds) before transcription is kept.
  # Prevents accidental triggers from brief call joins/drops.
  min_meeting_duration_seconds: 30

  # Number of consecutive positive detections required before starting
  # recording. At 3s polling, 3 = ~9 seconds of confirmed meeting activity.
  # Prevents false positives from transient audio device usage.
  required_consecutive_detections: 3

  # Process names to monitor. Supports Teams (new) and classic.
  process_names:
    - "Microsoft Teams"
    - "MSTeams"
    - "Teams"

# --- Audio Capture ---
audio:
  # Name of the BlackHole virtual audio device as it appears in
  # Audio MIDI Setup. Run `python -m sounddevice` to list devices.
  blackhole_device_name: "BlackHole 2ch"

  # Microphone device name (substring match). Empty = system default input.
  # This captures your voice alongside the remote participants' audio.
  mic_device_name: ""

  # Whether to mix microphone input with system audio.
  mic_enabled: true

  # Mic gain relative to system audio (0.0–2.0). Adjust if your voice
  # is too quiet or too loud relative to remote participants.
  mic_volume: 1.0

  # System audio gain after normalisation (0.0–2.0). Increase if remote
  # participants' audio is too quiet in the final recording.
  system_volume: 1.0

  # Sample rate in Hz. 16000 is optimal for speech recognition.
  sample_rate: 16000

  # Number of audio channels. BlackHole 2ch provides stereo;
  # we downmix to mono for transcription.
  channels: 1

  # Temporary directory for raw audio chunks during recording.
  temp_audio_dir: "/tmp/meetingmind"

  # Keep separate source WAV files (system + mic) after merging.
  # Required for speaker diarisation. If false, temp files are deleted.
  keep_source_files: false

# --- Transcription ---
transcription:
  # faster-whisper model size. Options: tiny.en, base.en, small.en,
  # medium.en, large-v3. Larger models are more accurate but slower.
  # Recommendation: small.en for M1/M2, medium.en for M2 Pro/Max+.
  model_size: "small.en"

  # Compute backend. "auto" selects the best available.
  # Options: auto, cpu, cuda (not applicable on Mac, but future-proof).
  compute_type: "auto"

  # Language. Use "en" for English-only models, or "auto" to detect.
  language: "en"

  # Number of CPU threads for inference. 0 = auto-detect.
  cpu_threads: 0

  # Silero VAD threshold (0.0–1.0). Lower values keep more audio,
  # higher values filter more aggressively. Default Whisper is 0.5;
  # 0.35 is recommended to avoid discarding quiet remote audio.
  vad_threshold: 0.35

# --- Summarisation ---
summarisation:
  # Backend: "ollama" (local, free) or "claude" (Anthropic API, requires credits).
  backend: "ollama"

  # --- Ollama settings (used when backend: ollama) ---
  # Install: https://ollama.com  then: ollama pull llama3.1:8b
  ollama_base_url: "http://localhost:11434"
  ollama_model: "llama3.1:8b"
  ollama_timeout: 600  # Seconds per Ollama request (default: 600)
  # Context window size for Ollama. Must be large enough for full transcript.
  # 32768 (32K tokens) handles transcripts up to ~24,000 words.
  ollama_num_ctx: 32768

  # --- Claude settings (used when backend: claude) ---
  anthropic_api_key: "sk-ant-..."
  model: "claude-sonnet-4-20250514"

  # Maximum tokens for the summary response (applies to both backends).
  max_tokens: 4096

# --- Speaker Diarisation ---
diarisation:
  # Enable energy-based speaker labelling ("Me" vs "Remote").
  # Requires dual-source recording (mic_enabled: true).
  # Source WAV files are automatically kept when enabled.
  enabled: false

  # Label for the local user (you).
  speaker_name: "Me"

  # Label for remote participants.
  remote_label: "Remote"

  # Energy ratio threshold. A source must be this many times louder
  # than the other to be classified as the sole speaker. Lower values
  # are more decisive; higher values produce more "crosstalk" labels.
  energy_ratio_threshold: 1.5

# --- Output: Markdown Vault ---
markdown:
  enabled: true

  # Absolute path to the Obsidian vault meetings folder.
  vault_path: "~/Documents/Meetings"

  # Template for the filename. Available variables:
  # {date}, {time}, {slug} (auto-generated from summary title).
  filename_template: "{date}_{slug}.md"

  # Whether to include the full transcript in the markdown file.
  include_full_transcript: true

# --- Output: Notion ---
notion:
  enabled: false

  # Notion integration token (internal integration).
  api_key: "ntn_..."

  # The database ID to create meeting pages in.
  # Find this in the database URL: notion.so/<workspace>/<database_id>?v=...
  database_id: ""

  # Property mappings (Notion database property names).
  properties:
    title: "Name"
    date: "Date"
    tags: "Tags"
    status: "Status"

# --- Logging ---
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "~/Library/Logs/meetingmind.log"

# --- API Server ---
# The UI connects to this server for real-time status and meeting history.
api:
  enabled: true
  host: "127.0.0.1"
  port: 9876
